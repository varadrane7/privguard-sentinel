name: PrivGuard Sentinel — AI PR Review

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  privguard-sentinel:
    name: PrivGuard Sentinel
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # required to post inline review comments
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Run PrivGuard Sentinel
        id: sentinel
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-api-url:  ${{ secrets.LLM_API_URL }}
          llm-api-key:  ${{ secrets.LLM_API_KEY }}
          llm-model:    ${{ vars.LLM_MODEL || 'llama3:8b' }}
          strict-mode:  'true'

      - name: Echo decision
        if: always()
        run: |
          echo "Decision: ${{ steps.sentinel.outputs.decision }}"
          echo "Overall score: ${{ steps.sentinel.outputs.overall-score }}"
