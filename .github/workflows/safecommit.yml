name: PrivGuard Nexus — AI Code Review

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  privguard-scan:
    name: PrivGuard Nexus — Privacy, Security & Backdoor Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build scanner
        run: npm run build --workspace=scanner

      - name: Run PrivGuard scan
        id: scan
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL || 'http://localhost:11434' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || '' }}
        run: |
          node scanner/dist/index.js . \
            --output privguard-report.json \
            --fail-on-block
        continue-on-error: true

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: privguard-report
          path: privguard-report.json
          retention-days: 30

      - name: Post scan summary
        if: always()
        run: |
          if [ -f privguard-report.json ]; then
            DECISION=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['overallDecision'])")
            OVERALL=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['scores']['overall'])")
            PRIVACY=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['scores']['privacy'])")
            SECURITY=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['scores']['security'])")
            AI_SAFETY=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['scores']['aiSafety'])")
            BACKDOOR=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['scores']['backdoorRisk'])")
            FINDINGS=$(python3 -c "import sys,json; d=json.load(open('privguard-report.json')); print(d['summary']['totalFindings'])")
            echo "## PrivGuard Nexus Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Score |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Decision** | **${DECISION}** |" >> $GITHUB_STEP_SUMMARY
            echo "| Overall Risk | ${OVERALL}/100 |" >> $GITHUB_STEP_SUMMARY
            echo "| Privacy | ${PRIVACY}/100 |" >> $GITHUB_STEP_SUMMARY
            echo "| Security | ${SECURITY}/100 |" >> $GITHUB_STEP_SUMMARY
            echo "| AI Safety | ${AI_SAFETY}/100 |" >> $GITHUB_STEP_SUMMARY
            echo "| Backdoor Risk | ${BACKDOOR}/100 |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Findings | ${FINDINGS} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Block on Do Not Merge decision
        if: steps.scan.outcome == 'failure'
        run: |
          echo "PrivGuard Nexus blocked this deployment: Do Not Merge."
          echo "Review privguard-report.json for details and fix all critical findings."
          exit 1
